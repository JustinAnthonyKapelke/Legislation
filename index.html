<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRA Campaign Poster - Animated</title>

<style>
/* ===== BASE ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #1a1a18, #0d0d0c);
    padding: 20px;
    overflow-x: hidden;
}

/* ===== GLOBAL ANIMATIONS ===== */
@keyframes floatGlow {
    0%, 100% { transform: translateY(0); opacity: 0.6; }
    50% { transform: translateY(-15px); opacity: 1; }
}

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* ===== POSTER ===== */
.poster {
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    background: #fff;
    box-shadow: 0 30px 100px rgba(0,0,0,0.5);
    overflow: hidden;
    animation: fadeUp 1s ease-out;
}

/* ===== HERO ===== */
.hero {
    background: linear-gradient(135deg, #0d0d0c, #2c2c2a, #1a1a18);
    background-size: 200% 200%;
    animation: gradientShift 8s ease infinite;
    padding: 80px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.hero::before,
.hero::after {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(239,159,39,0.25), transparent 60%);
    animation: floatGlow 6s infinite ease-in-out;
    border-radius: 50%;
}

.hero::before { top: -100px; left: -100px; }
.hero::after { bottom: -150px; right: -120px; animation-delay: 2s; }

.hero h1 {
    font-size: 56px;
    color: #fff;
    font-weight: 800;
    letter-spacing: -1px;
    animation: fadeUp 1.2s ease-out;
}

.hero h1 .highlight {
    color: #ef9f27;
    display: block;
    text-shadow: 0 0 20px rgba(239,159,39,0.6);
}

.banner {
    margin-top: 25px;
    background: #e24b4a;
    padding: 16px 32px;
    display: inline-block;
    border-radius: 8px;
    font-weight: 800;
    animation: pulse 2.5s infinite;
    box-shadow: 0 0 30px rgba(226,75,74,0.4);
}

/* ===== INTRO ===== */
.intro {
    padding: 50px;
    background: #fafafa;
    text-align: center;
    animation: fadeUp 1s ease-out;
}

.intro .emphasis {
    color: #e24b4a;
    font-size: 20px;
    font-weight: 800;
    animation: pulse 3s infinite;
}

/* ===== CARDS ===== */
.req-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 30px;
}

.req-card {
    padding: 28px;
    border-radius: 12px;
    transition: all 0.4s ease;
    animation: fadeUp 1s ease-out;
}

.req-card:hover {
    transform: translateY(-10px) scale(1.02);
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* ===== PIPELINE ===== */
.pipeline-step {
    transition: all 0.3s ease;
}

.pipeline-step:hover {
    transform: scale(1.1);
}

/* ===== CTA ===== */
.cta-button {
    animation: pulse 2s infinite;
    transition: all 0.3s ease;
}

.cta-button:hover {
    transform: translateY(-5px) scale(1.1);
    box-shadow: 0 10px 40px rgba(239,159,39,0.6);
}

/* ===== SCROLL REVEAL (CSS ONLY) ===== */
.req-card,
.timeline-item,
.consequence-box {
    opacity: 0;
    animation: fadeUp 1s ease forwards;
}

.req-card:nth-child(1) { animation-delay: 0.1s; }
.req-card:nth-child(2) { animation-delay: 0.2s; }
.req-card:nth-child(3) { animation-delay: 0.3s; }
.req-card:nth-child(4) { animation-delay: 0.4s; }
.req-card:nth-child(5) { animation-delay: 0.5s; }
.req-card:nth-child(6) { animation-delay: 0.6s; }

/* KEEP YOUR ORIGINAL STYLES BELOW (unchanged) */
</style>
</head>

<body>
<div class="poster">

    <!-- HERO -->
    <div class="hero">
        <h1>
            Ship Features.<br>
            <span class="highlight">Don't Ship Vulnerabilities.</span>
        </h1>
        <div class="banner">CRA IS NOT OPTIONAL. IT'S A RELEASE BLOCKER.</div>
    </div>

    <!-- REST OF YOUR ORIGINAL HTML STAYS EXACTLY THE SAME -->
    <!-- (intro, requirements, pipeline, etc.) -->

</div>
</body>
</html>
